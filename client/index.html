<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── MOBILE CRITICAL ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- ── SEO ── -->
    <title>MedSave — Never Overpay for Medicine Again</title>
    <meta name="description" content="MedSave compares medicine prices across Jan Aushadhi, Apollo, MedPlus, PharmEasy and local pharmacies. Save up to 90% on medicines in India with AI-powered features." />
    <meta name="keywords" content="medicine price comparison, Jan Aushadhi, generic medicine India, cheap medicine, PMBJP, MedSave" />
    <meta name="author" content="MedSave" />
    <link rel="canonical" href="https://medsave.vercel.app/" />

    <!-- ── PWA / MOBILE ── -->
    <meta name="theme-color" content="#0D9488" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MedSave" />
    <meta name="msapplication-TileColor" content="#0D9488" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── OPEN GRAPH ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://medsave.vercel.app/" />
    <meta property="og:title" content="MedSave — Never Overpay for Medicine Again" />
    <meta property="og:description" content="Compare medicine prices. Jan Aushadhi is 90% cheaper than branded. MedSave shows you exactly where to save." />
    <meta property="og:image" content="https://medsave.vercel.app/og-image.png" />

    <!-- ── TWITTER CARD ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MedSave — Never Overpay for Medicine Again" />
    <meta name="twitter:description" content="India's #1 AI-powered medicine price comparator. Save up to 90% with Jan Aushadhi." />

    <!-- ── ICONS & MANIFEST ── -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── PERFORMANCE ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- ── MOBILE TOUCH DELAY FIX ── -->
    <style>
      * { touch-action: manipulation; }
      html { -webkit-text-size-adjust: 100%; }
      body { -webkit-tap-highlight-color: transparent; }
      /* Prevent flash of unstyled content */
      #root { min-height: 100vh; background: #020d0b; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
